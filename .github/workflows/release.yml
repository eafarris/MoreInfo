name: Release

# Fires on any tag matching v*, e.g. v0.9.0 or v1.0.0-beta.1
on:
  push:
    tags:
      - 'v*'

# Needed for creating/uploading the draft release.
permissions:
  contents: write

jobs:
  # ── macOS — Apple Silicon ───────────────────────────────────────────────────
  build-macos:
    name: Build · macOS (Apple Silicon)
    runs-on: macos-14   # GitHub-hosted arm64 runner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Pin to stable Rust; aarch64-apple-darwin is the native target on macos-14.
      - uses: dtolnay/rust-toolchain@stable

      # Cache the Cargo registry + compiled deps across runs.
      # workspaces tells rust-cache where the Cargo.toml lives.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node dependencies
        run: npm ci

      # tauri.conf.json has bundle.active:false (for dev ergonomics).
      # Override it here and request only the DMG target so the build
      # doesn't also try to produce targets unavailable on this runner.
      - name: Build macOS DMG
        run: npx tauri build --bundles dmg --config '{"bundle":{"active":true}}'

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoreInfo-macOS-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 1

  # ── Windows — x86_64 ────────────────────────────────────────────────────────
  build-windows:
    name: Build · Windows (x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node dependencies
        run: npm ci

      # shell:bash avoids PowerShell quoting issues with the --config JSON.
      - name: Build Windows NSIS installer
        shell: bash
        run: npx tauri build --bundles nsis --config '{"bundle":{"active":true}}'

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoreInfo-Windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 1

  # ── Draft release ────────────────────────────────────────────────────────────
  draft-release:
    name: Draft GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      # Download both artifacts into subdirectories named after the artifact.
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/MoreInfo-macOS-arm64/*.dmg
            artifacts/MoreInfo-Windows-x64/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
