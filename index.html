<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoreInfo</title>


  <!-- Oswald wordmark font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap" rel="stylesheet">

  <!-- Phosphor Icons (regular + bold + fill weights) -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <style>
    /* Scrollbars */
    ::-webkit-scrollbar            { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track      { background: transparent; }
    ::-webkit-scrollbar-thumb      { background: var(--color-olive-700); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover{ background: var(--color-olive-600); }

    /* Render mode: side-by-side editor + preview */
    [data-mode="render"] #h-divider,
    [data-mode="render"] #preview-pane { display: none; }
    #editor-area[data-mode="render"]   { flex-direction: row; }

    #v-divider,
    #markdown-pane { display: none; }
    [data-mode="render"] #v-divider     { display: flex; }
    [data-mode="render"] #markdown-pane { display: flex; flex: 1; min-width: 0; flex-direction: column; }

    /* ── Sidebar layout ───────────────────────────────────────
       VS Code model:
         main-area (flex-col, position:relative — top flyout anchored here)
           top-sidebar   (full width, above content-row)
           content-row   (flex-row)
             left-sidebar   (full height flex child)
             center-column  (flex-col, flex-1, position:relative — bottom flyout anchored here)
               editor-area
               bottom-sidebar
             right-sidebar  (full height flex child)
       The top sidebar lives above content-row so it frames the window
       and does not overlap the editor title bar.
    ─────────────────────────────────────────────────────────── */

    /* Give every sidebar position:relative so its absolute resize
       handle is contained within it (even when flyout makes it
       position:absolute — that still creates a containing block). */
    #left-sidebar, #right-sidebar, #top-sidebar, #bottom-sidebar {
      position: relative;
    }

    /* hidden: removed from layout */
    #left-sidebar[data-sb-state="hidden"],
    #right-sidebar[data-sb-state="hidden"],
    #top-sidebar[data-sb-state="hidden"],
    #bottom-sidebar[data-sb-state="hidden"] { display: none; }

    /* flyout: overlays adjacent content.
       L/R are contained by #content-row (position:relative).
       Top is contained by #main-area (position:relative).
       Bottom is contained by #center-column (position:relative).
       Background opacity + backdrop-blur are applied via Tailwind
       data-attribute variants on the element itself. */
    #left-sidebar[data-sb-state="flyout"] {
      position: absolute; left: 0; top: 0; bottom: 0; z-index: 20;
      box-shadow: 4px 0 24px rgba(0,0,0,0.65);
    }
    #right-sidebar[data-sb-state="flyout"] {
      position: absolute; right: 0; top: 0; bottom: 0; z-index: 20;
      box-shadow: -4px 0 24px rgba(0,0,0,0.65);
    }
    #top-sidebar[data-sb-state="flyout"] {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      box-shadow: 0 4px 24px rgba(0,0,0,0.65);
    }
    #bottom-sidebar[data-sb-state="flyout"] {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.65);
    }

    /* ── Flyout entrance animations ──────────────────────────── */

    @keyframes sb-in-left   { from { transform:translateX(-14px); opacity:0; } to { transform:none; opacity:1; } }
    @keyframes sb-in-right  { from { transform:translateX(14px);  opacity:0; } to { transform:none; opacity:1; } }
    @keyframes sb-in-top    { from { transform:translateY(-14px); opacity:0; } to { transform:none; opacity:1; } }
    @keyframes sb-in-bottom { from { transform:translateY(14px);  opacity:0; } to { transform:none; opacity:1; } }
    @keyframes sb-fade-in   { from { opacity:0; }                              to { opacity:1; }                }

    #left-sidebar[data-sb-state="flyout"]   { animation: sb-in-left   160ms cubic-bezier(.2,0,.2,1); }
    #right-sidebar[data-sb-state="flyout"]  { animation: sb-in-right  160ms cubic-bezier(.2,0,.2,1); }
    #top-sidebar[data-sb-state="flyout"]    { animation: sb-in-top    160ms cubic-bezier(.2,0,.2,1); }
    #bottom-sidebar[data-sb-state="flyout"] { animation: sb-in-bottom 160ms cubic-bezier(.2,0,.2,1); }

    /* Pinned: fade in when sidebar is newly shown */
    #left-sidebar[data-sb-state="pinned"],
    #right-sidebar[data-sb-state="pinned"],
    #top-sidebar[data-sb-state="pinned"],
    #bottom-sidebar[data-sb-state="pinned"]  { animation: sb-fade-in 120ms ease; }

    /* ── Resize handles ───────────────────────────────────────── */

    .sb-resize {
      position: absolute; z-index: 5;
      background: transparent;
      transition: background 150ms;
    }
    .sb-resize:hover    { background: rgba(245,158,11,0.12); }
    .sb-resize.is-resizing { background: rgba(245,158,11,0.22); }

    [data-sb-resize="left"]   { right:  0; top: 0; bottom: 0; width:  5px; cursor: ew-resize; }
    [data-sb-resize="right"]  { left:   0; top: 0; bottom: 0; width:  5px; cursor: ew-resize; }
    [data-sb-resize="top"]    { bottom: 0; left: 0; right:  0; height: 5px; cursor: ns-resize; }
    [data-sb-resize="bottom"] { top:    0; left: 0; right:  0; height: 5px; cursor: ns-resize; }

    .sb-resize-dots {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%; gap: 3px;
      opacity: 0; transition: opacity 150ms;
    }
    [data-sb-resize="left"]  .sb-resize-dots,
    [data-sb-resize="right"] .sb-resize-dots  { flex-direction: column; }
    [data-sb-resize="top"]   .sb-resize-dots,
    [data-sb-resize="bottom"].sb-resize-dots  { flex-direction: row; }
    .sb-resize:hover .sb-resize-dots,
    .sb-resize.is-resizing .sb-resize-dots { opacity: 1; }
    .sb-resize-dots span {
      display: block; width: 3px; height: 3px;
      border-radius: 50%; background: #f59e0b;
    }

    /* ── Action button icons ────────────────────────────────── */

    /* CSS-driven: correct icon appears based on current state */
    .sb-icon-pin, .sb-icon-close { display: none; }
    [data-sb-state="flyout"] .sb-icon-pin   { display: inline; }
    [data-sb-state="pinned"] .sb-icon-close { display: inline; }

    /* ── Collapsed edge tabs ──────────────────────────────────
       Invisible hit areas at each edge when the sidebar is hidden.
       On mouse-in they fade into view (peek state); after a short
       delay the flyout opens. Mouse-out cancels and fades back out.
       L/R tabs live inside #content-row (position:relative).
       Bottom tab lives inside #center-column (position:relative).
    ─────────────────────────────────────────────────────────── */

    .sb-collapsed {
      position: absolute; z-index: 10;
      display: none;
      align-items: center; justify-content: center;
      cursor: pointer;
    }
    /* Visible (sidebar hidden): present but invisible until hovered */
    .sb-collapsed.sb-visible {
      display: flex;
      opacity: 0;
      transition: opacity 150ms, background 150ms;
    }
    /* Peek state: strip fades in on mouse-in */
    .sb-collapsed.sb-peek {
      opacity: 1;
      background: rgba(245, 158, 11, 0.12);
    }

    /* Top collapsed tab: disabled — kept in flow but never shown */
    #collapsed-top {
      position: relative; top: auto; left: auto; right: auto;
      width: 100%; height: 8px;
    }

    #collapsed-left   { left:   0; top: 0; bottom: 0; width:  8px; }
    #collapsed-right  { right:  0; top: 0; bottom: 0; width:  8px; }
    #collapsed-bottom { bottom: 0; left: 0; right:  0; height: 8px; }

    /* Caret: invisible until peek, then amber */
    .sb-caret { color: transparent; font-size: 9px; line-height: 1; transition: color 150ms; }
    .sb-collapsed.sb-peek .sb-caret { color: rgba(245, 158, 11, 0.7); }

  </style>
</head>

<body class="bg-olive-900 text-olive-300 h-screen flex flex-col overflow-hidden select-none">

  <!-- ── Toolbar ──────────────────────────────────────────────── -->
  <header
    id="toolbar"
    class="flex items-center gap-2 px-3 py-1.5 bg-olive-800 border-b border-olive-700 shrink-0"
    style="-webkit-app-region: drag"
  >
    <!-- Wordmark + left sidebar toggles -->
    <div class="flex items-center gap-1 shrink-0" style="-webkit-app-region: no-drag">
      <span style="font-family:'Oswald',sans-serif; font-weight:500; font-size:0.85rem; letter-spacing:0.06em; color:#fff; background:var(--color-amber-700); padding:0.15em 0.45em; border-radius:3px; -webkit-app-region:drag; user-select:none">MoreInfo</span>
      <div class="w-px h-4 bg-olive-700 mx-0.5"></div>
      <button id="btn-toggle-left" title="Toggle left sidebar" data-active
        class="flex items-center justify-center w-6 h-6 rounded text-olive-400 hover:bg-olive-700 hover:text-white transition-colors data-active:text-olive-200">
        <i class="ph ph-sidebar-simple text-base leading-none"></i>
      </button>
      <button id="btn-toggle-top" title="Toggle top panel" style="display:none"
        class="flex items-center justify-center w-6 h-6 rounded text-olive-400 hover:bg-olive-700 hover:text-white transition-colors data-active:text-olive-200">
        <i class="ph ph-sidebar-simple text-base leading-none" style="transform:rotate(-90deg)"></i>
      </button>
      <button id="btn-toggle-bottom" title="Toggle bottom panel"
        class="flex items-center justify-center w-6 h-6 rounded text-olive-400 hover:bg-olive-700 hover:text-white transition-colors data-active:text-olive-200">
        <i class="ph ph-sidebar-simple text-base leading-none" style="transform:rotate(90deg)"></i>
      </button>
    </div>

    <!-- Breadcrumbs — takes remaining space, draggable except on items -->
    <nav id="breadcrumbs"
      class="flex-1 min-w-0 flex items-center gap-0.5 text-xs text-olive-500 overflow-x-auto whitespace-nowrap"
      style="min-height:1.5rem; -webkit-app-region:no-drag"></nav>

    <!-- Right controls -->
    <div class="flex items-center gap-1.5 shrink-0" style="-webkit-app-region: no-drag">
      <button id="btn-today" title="Open today's journal"
        class="flex items-center gap-1.5 px-2.5 py-1 rounded text-xs text-olive-400 hover:bg-olive-700 hover:text-white transition-colors border border-olive-700">
        <i class="ph ph-calendar-star text-sm leading-none"></i>Today
      </button>

      <div class="w-px h-4 bg-olive-700"></div>

      <div class="flex rounded border border-olive-700 overflow-hidden text-xs">
        <button data-mode="edit" title="Edit only"
          class="flex items-center gap-1.5 px-2.5 py-1 text-olive-400 hover:bg-olive-700 transition-colors data-active:bg-amber-600 data-active:text-white">
          <i class="ph ph-pencil-simple text-sm leading-none"></i>Edit
        </button>
        <button data-mode="render" title="Editor + Markdown preview"
          class="flex items-center gap-1.5 px-2.5 py-1 text-olive-400 border-l border-olive-700 hover:bg-olive-700 transition-colors data-active:bg-amber-600 data-active:text-white">
          <i class="ph ph-eye text-sm leading-none"></i>Render
        </button>
      </div>

      <div class="w-px h-4 bg-olive-700 mx-1"></div>

      <button id="btn-toggle-right" title="Toggle right sidebar" data-active
        class="flex items-center justify-center w-6 h-6 rounded text-olive-400 hover:bg-olive-700 hover:text-white transition-colors data-active:text-olive-200">
        <i class="ph ph-sidebar-simple text-base leading-none" style="transform:scaleX(-1)"></i>
      </button>
    </div>
  </header>

  <!-- ── Main area ────────────────────────────────────────────────
       flex-col: top-sidebar | content-row
       position:relative so the top flyout is anchored here.
  ──────────────────────────────────────────────────────────────── -->
  <div id="main-area" class="flex flex-col flex-1 min-h-0 overflow-hidden relative">

    <!-- Collapsed edge tab for top (in normal flow, sits above content-row
         so the strip appears between the toolbar and the editor title bar) -->
    <div id="collapsed-top" class="sb-collapsed" style="display:none !important"><i class="ph ph-caret-down sb-caret"></i></div>

    <!-- ── Top sidebar (full width, above content-row) ────────── -->
    <div id="top-sidebar" data-sb-state="hidden"
      class="shrink-0 border-b border-olive-700 flex flex-col bg-olive-900 data-[sb-state=flyout]:bg-olive-900/10 data-[sb-state=flyout]:backdrop-blur-lg"
      style="height:160px">

      <!-- Bottom resize handle -->
      <div class="sb-resize" data-sb-resize="top">
        <div class="sb-resize-dots"><span></span><span></span><span></span></div>
      </div>
      <!-- Header -->
      <div class="flex items-center justify-between px-3 py-1.5 shrink-0 border-b border-olive-700/60 bg-olive-800">
        <span class="text-xs font-semibold text-olive-600 tracking-wider uppercase">Top Panel</span>
        <button class="sb-action-btn w-5 h-5 flex items-center justify-center rounded text-olive-600 hover:text-olive-300 hover:bg-olive-700 transition-colors">
          <i class="sb-icon-pin ph ph-push-pin text-xs leading-none"></i>
          <i class="sb-icon-close ph ph-x text-xs leading-none"></i>
        </button>
      </div>
      <!-- Widget stack -->
      <div class="widget-stack flex-1 min-h-0 flex flex-col" data-widgets="top"></div>
    </div>

    <!-- ── Content row ──────────────────────────────────────────────
         flex-row: left-sidebar | center-column | right-sidebar
         position:relative so L/R flyouts are contained here.
    ──────────────────────────────────────────────────────────────── -->
    <div id="content-row" class="flex flex-1 min-h-0 overflow-hidden relative">

      <!-- Collapsed edge tabs for L/R (anchored to content-row) -->
      <div id="collapsed-left"  class="sb-collapsed"><i class="ph ph-caret-right sb-caret"></i></div>
      <div id="collapsed-right" class="sb-collapsed"><i class="ph ph-caret-left  sb-caret"></i></div>

      <!-- ── Left sidebar (full height) ───────────────────────── -->
      <aside id="left-sidebar" data-sb-state="pinned"
        class="shrink-0 border-r border-olive-700 flex flex-col bg-olive-900 data-[sb-state=flyout]:bg-olive-900/10 data-[sb-state=flyout]:backdrop-blur-lg"
        style="width:208px">

        <!-- Right resize handle -->
        <div class="sb-resize" data-sb-resize="left">
          <div class="sb-resize-dots"><span></span><span></span><span></span></div>
        </div>
        <!-- Header: label + action button -->
        <div class="flex items-center justify-between px-3 py-1.5 shrink-0 border-b border-olive-700/60 bg-olive-800">
          <span class="text-xs font-semibold text-olive-600 tracking-wider uppercase">Left Sidebar</span>
          <button class="sb-action-btn w-5 h-5 flex items-center justify-center rounded text-olive-600 hover:text-olive-300 hover:bg-olive-700 transition-colors">
            <i class="sb-icon-pin ph ph-push-pin text-xs leading-none"></i>
            <i class="sb-icon-close ph ph-x text-xs leading-none"></i>
          </button>
        </div>
        <!-- Widget stack -->
        <div class="widget-stack flex-1 min-h-0 flex flex-col" data-widgets="left"></div>
      </aside>

      <!-- ── Center column ─────────────────────────────────────────
           flex-col: editor-area | bottom-sidebar
           position:relative so the bottom flyout is anchored here.
      ──────────────────────────────────────────────────────────── -->
      <div id="center-column" class="flex flex-col flex-1 min-h-0 overflow-hidden relative">

        <!-- Collapsed edge tab for bottom (anchored to center-column) -->
        <div id="collapsed-bottom" class="sb-collapsed"><i class="ph ph-caret-up sb-caret"></i></div>

        <!-- ── Editor area ─────────────────────────────────────── -->
        <main id="editor-area" data-mode="edit"
          class="flex flex-col flex-1 min-h-0 overflow-hidden">

          <!-- Editor pane -->
          <div id="editor-pane" class="flex-1 min-h-0 relative overflow-hidden">
            <div id="doc-title" class="px-6 pt-5 pb-3 text-xl font-semibold text-olive-100 leading-tight select-text"></div>
            <div id="editor" class="absolute inset-0"></div>
          </div>

          <!-- Vertical resize handle (render mode only) -->
          <div id="v-divider"
            class="shrink-0 w-1.25 bg-olive-800 border-l border-r border-olive-700/60 cursor-col-resize group hover:bg-amber-950 transition-colors"
            title="Drag to resize">
            <div class="flex flex-col items-center justify-center h-full gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
              <span class="block w-1 h-1 rounded-full bg-olive-500"></span>
              <span class="block w-1 h-1 rounded-full bg-olive-500"></span>
              <span class="block w-1 h-1 rounded-full bg-olive-500"></span>
            </div>
          </div>

          <!-- Markdown preview pane (render mode only) -->
          <div id="markdown-pane" class="overflow-auto bg-olive-900">
            <div id="markdown-content" class="prose prose-invert prose-sm max-w-none p-6 select-text"></div>
          </div>
        </main>

        <!-- ── Bottom sidebar ─────────────────────────────────── -->
        <div id="bottom-sidebar" data-sb-state="hidden"
          class="shrink-0 border-t border-olive-700 flex flex-col bg-olive-900 data-[sb-state=flyout]:bg-olive-900/10 data-[sb-state=flyout]:backdrop-blur-lg"
          style="height:180px">

          <!-- Top resize handle -->
          <div class="sb-resize" data-sb-resize="bottom">
            <div class="sb-resize-dots"><span></span><span></span><span></span></div>
          </div>
          <!-- Header -->
          <div class="flex items-center justify-between px-3 py-1.5 shrink-0 border-b border-olive-700/60 bg-olive-800">
            <span class="text-xs font-semibold text-olive-600 tracking-wider uppercase">Bottom Panel</span>
            <button class="sb-action-btn w-5 h-5 flex items-center justify-center rounded text-olive-600 hover:text-olive-300 hover:bg-olive-700 transition-colors">
              <i class="sb-icon-pin ph ph-push-pin text-xs leading-none"></i>
              <i class="sb-icon-close ph ph-x text-xs leading-none"></i>
            </button>
          </div>
          <!-- Widget stack: flex-row for side-by-side widgets -->
          <div class="widget-stack flex-1 min-h-0 flex flex-row" data-widgets="bottom"></div>
        </div>

      </div><!-- end center-column -->

      <!-- ── Right sidebar (full height) ──────────────────────── -->
      <aside id="right-sidebar" data-sb-state="pinned"
        class="shrink-0 border-l border-olive-700 flex flex-col bg-olive-900 data-[sb-state=flyout]:bg-olive-900/10 data-[sb-state=flyout]:backdrop-blur-lg"
        style="width:208px">

        <!-- Left resize handle -->
        <div class="sb-resize" data-sb-resize="right">
          <div class="sb-resize-dots"><span></span><span></span><span></span></div>
        </div>
        <!-- Header: label + action button -->
        <div class="flex items-center justify-between px-3 py-1.5 shrink-0 border-b border-olive-700/60 bg-olive-800">
          <span class="text-xs font-semibold text-olive-600 tracking-wider uppercase">Right Sidebar</span>
          <button class="sb-action-btn w-5 h-5 flex items-center justify-center rounded text-olive-600 hover:text-olive-300 hover:bg-olive-700 transition-colors">
            <i class="sb-icon-pin ph ph-push-pin text-xs leading-none"></i>
            <i class="sb-icon-close ph ph-x text-xs leading-none"></i>
          </button>
        </div>
        <!-- Widget stack (populated by mountWidgets in main.js) -->
        <div class="widget-stack flex-1 min-h-0 flex flex-col" data-widgets="right"></div>
      </aside>

    </div><!-- end content-row -->

  </div><!-- end main-area -->

  <!-- ── Status bar ──────────────────────────────────────────── -->
  <footer id="status-bar"
    class="flex items-center gap-2 px-3 py-0.5 bg-amber-700 text-white text-xs shrink-0">
    <i class="ph ph-file-text text-sm leading-none"></i>
    <span id="file-name">Untitled</span>
    <span id="modified-indicator" class="text-yellow-300 text-sm leading-none"></span>
    <span id="index-status" class="ml-auto flex items-center gap-1 tabular-nums opacity-70"></span>
    <span id="cursor-info" class="tabular-nums"></span>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
